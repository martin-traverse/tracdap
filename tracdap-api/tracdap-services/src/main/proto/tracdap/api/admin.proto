syntax = "proto3";
package tracdap.api;

option java_package = "org.finos.tracdap.api";
option java_outer_classname = "DataServiceProto";
option java_multiple_files = true;

import "tracdap/metadata/object_id.proto";
import "tracdap/metadata/resource.proto";
import "tracdap/metadata/tag_update.proto";

import "google/api/annotations.proto";


service TracAdminApi {

  rpc createTenant(EmptyRequest) returns (EmptyResponse);
  rpc updateTenant(EmptyRequest) returns (EmptyResponse);

  rpc createResourceSpec(ResourceWriteRequest) returns (metadata.TagHeader);
  rpc updateResourceSpec(ResourceWriteRequest) returns (metadata.TagHeader);
  rpc readResourceSpec(ResourceReadRequest) returns (metadata.ResourceDefinition);
  rpc listResourceSpecs(EmptyRequest) returns (EmptyResponse);  // TODO

  rpc createResource(ResourceWriteRequest) returns (metadata.TagHeader);
  rpc updateResource(ResourceWriteRequest) returns (metadata.TagHeader);
  rpc readResource(ResourceReadRequest) returns (metadata.ResourceDefinition);

  rpc listResources(EmptyRequest) returns (EmptyResponse);  // TODO

}


message ResourceWriteRequest {

  string tenant = 1;

  metadata.ResourceType resourceType = 2;
  string resourceKey = 3;

  metadata.ResourceDefinition definition = 4;

  repeated metadata.TagUpdate attrs = 5;
}

message ResourceReadRequest {

  string tenant = 1;

  metadata.ResourceType resourceType = 2;
  string resourceKey = 3;
}



message EmptyRequest {}
message EmptyResponse {}